apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: logs
  namespace: helved
  labels:
    apiserver-access: "enabled"
spec:
  liveness:
    path: /
  readiness:
    path: /
  image: {{image}}
  port: 8080
  replicas:
    max: 1
    min: 1
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      memory: 256Mi
  accessPolicy:
    outbound:
      external:
        - host: slack.com
          ports:
            - port: 443
  env:
    - name: SLACK_CHANNEL
      value: "team-hel-ved-alerts"
    - name: AGGREGATE_WINDOW_SECONDS
      value: "600"
    - name: AGGREGATE_EDIT_THROTTLE_MS
      value: "5000"
  envFrom:
    - secret: budstikka

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: logs-role
  namespace: helved
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: logs-role-binding
  namespace: helved
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: logs-role
subjects:
  - kind: ServiceAccount
    name: logs
